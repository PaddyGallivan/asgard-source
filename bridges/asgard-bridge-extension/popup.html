<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 260px; padding: 12px; font-family: -apple-system, system-ui, sans-serif; background: #1a1a1a; color: #eee; margin: 0; }
  h1 { font-size: 14px; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #888; }
  .dot.idle { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
  .dot.busy { background: #facc15; }
  .dot.error { background: #f87171; }
  label { display: block; font-size: 11px; color: #b8b8b8; margin: 8px 0 4px; }
  input[type="text"], input[type="password"] { width: 100%; padding: 6px 8px; background: #252525; border: 1px solid #333; color: #eee; border-radius: 4px; box-sizing: border-box; font-size: 12px; }
  button { width: 100%; padding: 6px 10px; background: #d97757; border: 0; color: white; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 8px; font-weight: 600; }
  .row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #b8b8b8; margin: 6px 0; }
  .meta { font-size: 10px; color: #888; margin-top: 12px; }
</style>
</head>
<body>
<h1><span class="dot" id="dot"></span><span id="status">…</span></h1>
<div class="row">
  <label style="margin: 0; flex: 1">Enabled</label>
  <input type="checkbox" id="enabled" checked>
</div>
<label>PIN</label>
<input type="password" id="pin" placeholder="2967">
<button id="poll">Poll now</button>
<div class="meta">Asgard at <a href="https://asgard.pgallivan.workers.dev" target="_blank" style="color:#d97757">asgard.pgallivan.workers.dev</a></div>
<script src="popup.js"></script>
</body>
</html>
