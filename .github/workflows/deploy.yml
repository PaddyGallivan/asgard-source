name: Deploy Asgard workers

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
  workflow_dispatch:
    inputs:
      worker:
        description: 'Specific worker to redeploy (asgard, asgard-ai, asgard-tools, asgard-browser)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Identify changed workers
        id: changes
        run: |
          if [ -n "${{ github.event.inputs.worker }}" ]; then
            echo "workers=${{ github.event.inputs.worker }}" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'workers/*.js' | sed 's|workers/||;s|\.js$||' | tr '\n' ' ')
            echo "workers=$CHANGED" >> $GITHUB_OUTPUT
          fi
      - name: Deploy each changed worker
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: a6f47c17811ee2f8b6caeb8f38768c20
          ASGARD_PIN: ${{ secrets.ASGARD_PIN }}
        run: |
          for w in ${{ steps.changes.outputs.workers }}; do
            [ -z "$w" ] && continue
            echo "Deploying $w..."
            MAIN="worker.js"
            [ "$w" = "asgard" ] && MAIN="asgard.js"
            python3 -c "import json,base64; b64=base64.b64encode(open('workers/$w.js','rb').read()).decode('ascii'); print(json.dumps({'worker_name':'$w','code_b64':b64,'main_module':'$MAIN'}))" > /tmp/deploy_payload.json
            curl -s -X POST "https://asgard-tools.pgallivan.workers.dev/admin/deploy" \
              -H "Content-Type: application/json" \
              -H "X-Pin: $ASGARD_PIN" \
              --data @/tmp/deploy_payload.json
            echo
          done
      - name: Smoke test
        run: |
          sleep 4
          RESULT=$(curl -X POST "https://falkor-code.pgallivan.workers.dev/smoke" -H "X-Pin: ${{secrets.ASGARD_PIN}}")
          echo "$RESULT"
          OK=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('ok'))")
          if [ "$OK" != "True" ]; then
            echo "::error::Smoke test failed after deploy"
            exit 1
          fi